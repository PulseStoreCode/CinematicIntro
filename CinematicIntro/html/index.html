<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Skycam</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:transparent; overflow:hidden; font-family:'Arial Narrow','Arial',sans-serif; }

/* ══ TOGGLE ══ */
#toggle-btn {
  position:fixed; right:0; top:50%; transform:translateY(-50%);
  width:22px; height:60px;
  background:rgba(0,0,0,0.75);
  border:1px solid rgba(255,255,255,0.1); border-right:none;
  cursor:pointer; z-index:300;
  display:none; align-items:center; justify-content:center;
  user-select:none; transition:background 0.15s, right 0.3s ease;
}
#toggle-btn:hover { background:rgba(255,255,255,0.1); }
#toggle-btn .arr { color:rgba(255,255,255,0.6); font-size:10px; transition:transform 0.3s; }
#toggle-btn.open { right:262px; }
#toggle-btn.open .arr { transform:rotate(180deg); }

/* ══ SIDE LIST ══ */
#location-menu {
  position:fixed; right:0; top:50%;
  transform:translateY(-50%) translateX(20px);
  width:262px; max-height:82vh;
  background:rgba(0,0,0,0.82);
  border-left:2px solid rgba(255,255,255,0.07);
  overflow-y:auto; overflow-x:hidden;
  scrollbar-width:thin; scrollbar-color:rgba(255,255,255,0.15) transparent;
  transition:opacity 0.35s ease, transform 0.35s ease;
  opacity:0; pointer-events:none; z-index:200;
}
#location-menu.visible { opacity:1; pointer-events:all; transform:translateY(-50%) translateX(0); }
#location-menu::-webkit-scrollbar { width:3px; }
#location-menu::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.12); border-radius:2px; }

.menu-header {
  padding:12px 15px 9px;
  border-bottom:1px solid rgba(255,255,255,0.08);
  color:rgba(255,255,255,0.4); font-size:9px;
  letter-spacing:2.5px; text-transform:uppercase;
}

.location-item {
  display:flex; align-items:center; gap:10px;
  padding:8px 12px; cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,0.04);
  transition:background 0.12s; user-select:none;
}
.location-item:hover  { background:rgba(255,255,255,0.06); }
.location-item.active { background:rgba(255,255,255,0.1); }

/* blip: plain PNG icon, no circle */
.blip-icon {
  width:28px; height:28px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
}
.blip-icon img { width:22px; height:22px; object-fit:contain; display:block; }
/* fallback svg if no png */
.blip-icon svg { width:18px; height:18px; display:block; }

.item-info { flex:1; min-width:0; }
.item-name { color:#fff; font-size:12px; font-weight:700;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.item-district { color:rgba(255,255,255,0.35); font-size:10px; margin-top:1px; }
.item-arrow { color:rgba(255,255,255,0.25); font-size:8px;
  transition:transform 0.2s; flex-shrink:0; }
.location-item.active .item-arrow { transform:rotate(90deg); color:rgba(255,255,255,0.6); }

/* ══ INFO CARD (GTA Online style) ══ */
#info-card {
  position:fixed;
  right:270px; top:50%;
  transform:translateY(-50%) translateX(10px);
  width:295px;
  background:rgba(0,0,0,0.82);
  border:1px solid rgba(255,255,255,0.09);
  overflow:hidden;
  opacity:0; pointer-events:none;
  transition:opacity 0.25s ease, transform 0.25s ease;
  z-index:199;
  box-shadow:0 8px 40px rgba(0,0,0,0.9);
}
#info-card.visible { opacity:1; pointer-events:all; transform:translateY(-50%) translateX(0); }

/* photo zone */
.card-photo {
  position:relative; width:100%; height:152px;
  background:#111; overflow:hidden;
}
.card-photo img {
  width:100%; height:100%; object-fit:cover; display:block;
}
.card-photo-fallback {
  width:100%; height:100%;
  display:flex; align-items:center; justify-content:center;
}
.card-photo-grad {
  position:absolute; bottom:0; left:0; right:0; height:80px;
  background:linear-gradient(to top, rgba(0,0,0,0.96) 0%, transparent 100%);
  pointer-events:none;
}
/* GTA cursive title */
.card-name {
  position:absolute; bottom:9px; right:11px;
  font-family:'Georgia','Times New Roman',serif;
  font-style:italic; font-size:20px; font-weight:400;
  color:#fff; text-shadow:0 0 10px rgba(0,0,0,1), 0 1px 3px rgba(0,0,0,1);
  line-height:1.2; text-align:right; max-width:220px;
}

/* stats rows */
.card-stats { background:rgba(0,0,0,0.5); }
.card-row {
  display:flex; justify-content:space-between; align-items:center;
  padding:6px 12px;
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.card-row:last-child { border-bottom:none; }
.card-lbl { color:#fff; font-size:12px; font-weight:400; flex-shrink:0; }
.card-val { color:#fff; font-size:12px; font-weight:700;
  text-align:right; max-width:160px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.card-val.green { color:#7ec850; }
.card-val.blue  { color:#5ab4e5; }
.card-val.red   { color:#e05050; }

.card-sep { height:1px; background:rgba(255,255,255,0.1); }
.card-desc {
  padding:9px 12px 12px;
  color:rgba(255,255,255,0.65); font-size:11px; line-height:1.6;
  background:rgba(0,0,0,0.5);
}
</style>
</head>
<body>
<audio id="music" src="intro-sound.mp3" loop></audio>

<!-- SVG blip symbols: black bg, white icon -->

  <symbol id="b-bar"      viewBox="0 0 64 64"><path d="M18 12 L14 36 Q14 44 22 44 Q30 44 30 36 L26 12 Z" fill="white"/><path d="M38 18 L34 38 Q34 46 42 46 Q50 46 50 38 L46 18 Z" fill="white"/><rect x="20" y="44" width="6" height="8" rx="1" fill="white"/><rect x="40" y="46" width="6" height="8" rx="1" fill="white"/></symbol>
  <symbol id="b-music"    viewBox="0 0 64 64"><rect x="28" y="10" width="7" height="34" rx="2" fill="white"/><ellipse cx="22" cy="46" rx="10" ry="7" fill="white"/><path d="M35 10 L56 6 L56 22 L35 26 Z" fill="white"/></symbol>
  <symbol id="b-bank"     viewBox="0 0 64 64"><polygon points="32,6 8,20 56,20" fill="white"/><rect x="8" y="46" width="48" height="6" rx="1" fill="white"/><rect x="10" y="20" width="6" height="26" fill="white"/><rect x="29" y="20" width="6" height="26" fill="white"/><rect x="48" y="20" width="6" height="26" fill="white"/></symbol>
  <symbol id="b-gun"      viewBox="0 0 64 64"><rect x="8" y="26" width="32" height="14" rx="3" fill="white"/><rect x="40" y="28" width="16" height="6" rx="2" fill="white"/><rect x="20" y="40" width="7" height="12" rx="2" fill="white"/><rect x="10" y="18" width="10" height="9" rx="2" fill="white"/><rect x="14" y="40" width="14" height="4" rx="1" fill="white"/></symbol>
  <symbol id="b-car"      viewBox="0 0 64 64"><path d="M10 38 L14 26 L22 22 L42 22 L50 26 L54 38 L54 46 L10 46 Z" fill="white"/><path d="M22 22 L26 14 L38 14 L42 22" fill="white"/><circle cx="20" cy="46" r="6" fill="black" stroke="white" stroke-width="3"/><circle cx="44" cy="46" r="6" fill="black" stroke="white" stroke-width="3"/></symbol>
  <symbol id="b-garage"   viewBox="0 0 64 64"><rect x="8" y="12" width="48" height="42" rx="3" fill="white"/><rect x="8" y="8" width="48" height="8" rx="2" fill="white"/><rect x="14" y="26" width="36" height="4" rx="1" fill="black"/><rect x="14" y="34" width="36" height="4" rx="1" fill="black"/><rect x="14" y="42" width="36" height="4" rx="1" fill="black"/></symbol>
  <symbol id="b-police"   viewBox="0 0 64 64"><polygon points="32,4 38,22 56,22 42,33 47,51 32,40 17,51 22,33 8,22 26,22" fill="white"/><circle cx="32" cy="30" r="5" fill="black"/></symbol>
  <symbol id="b-hospital" viewBox="0 0 64 64"><rect x="24" y="8" width="16" height="48" rx="3" fill="white"/><rect x="8" y="24" width="48" height="16" rx="3" fill="white"/></symbol>
  <symbol id="b-hotel"    viewBox="0 0 64 64"><rect x="10" y="8" width="12" height="48" rx="2" fill="white"/><rect x="42" y="8" width="12" height="48" rx="2" fill="white"/><rect x="10" y="28" width="44" height="10" rx="2" fill="white"/></symbol>
  <symbol id="b-clothes"  viewBox="0 0 64 64"><path d="M32 10 Q40 10 40 18 Q40 22 32 24" stroke="white" stroke-width="4.5" fill="none" stroke-linecap="round"/><path d="M32 24 L8 44 L56 44 Z" stroke="white" stroke-width="4" fill="none" stroke-linejoin="round" stroke-linecap="round"/><rect x="8" y="44" width="48" height="7" rx="2" fill="white"/></symbol>
  <symbol id="b-race"     viewBox="0 0 64 64"><rect x="28" y="8" width="5" height="48" rx="2" fill="white"/><rect x="33" y="8" width="8" height="8" fill="white"/><rect x="41" y="8" width="8" height="8" fill="black"/><rect x="33" y="16" width="8" height="8" fill="black"/><rect x="41" y="16" width="8" height="8" fill="white"/><rect x="33" y="24" width="8" height="8" fill="white"/><rect x="41" y="24" width="8" height="8" fill="black"/><rect x="33" y="32" width="8" height="8" fill="black"/><rect x="41" y="32" width="8" height="8" fill="white"/></symbol>
  <symbol id="b-lab"      viewBox="0 0 64 64"><rect x="24" y="8" width="16" height="20" rx="2" fill="white"/><path d="M20 28 L8 54 Q8 58 32 58 Q56 58 56 54 L44 28 Z" fill="white"/><circle cx="22" cy="48" r="4" fill="black"/><circle cx="36" cy="42" r="3" fill="black"/><rect x="20" y="8" width="24" height="5" rx="2" fill="white"/></symbol>
  <symbol id="b-shield"   viewBox="0 0 64 64"><path d="M32 6 L54 14 L54 34 Q54 52 32 60 Q10 52 10 34 L10 14 Z" fill="white"/><path d="M20 32 L28 42 L46 22" stroke="black" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></symbol>
  <symbol id="b-plane"    viewBox="0 0 64 64"><path d="M32 6 L38 26 L58 32 L38 38 L32 58 L26 38 L6 32 L26 26 Z" fill="white"/></symbol>
  <symbol id="b-golf"     viewBox="0 0 64 64"><circle cx="32" cy="20" r="10" fill="white"/><rect x="30" y="30" width="4" height="24" rx="2" fill="white"/><ellipse cx="32" cy="56" rx="14" ry="4" fill="white"/><path d="M42 14 L54 10 L54 22" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/></symbol>
  <symbol id="b-cinema"   viewBox="0 0 64 64"><rect x="6" y="14" width="52" height="36" rx="3" fill="white"/><polygon points="26,24 26,44 46,34" fill="black"/></symbol>
  <symbol id="b-arena"    viewBox="0 0 64 64"><ellipse cx="32" cy="36" rx="26" ry="18" fill="white"/><ellipse cx="32" cy="36" rx="16" ry="10" fill="black"/><rect x="28" y="8" width="8" height="20" rx="2" fill="white"/></symbol>
  <symbol id="b-tattoo"   viewBox="0 0 64 64"><path d="M16 48 Q20 30 32 20 Q44 10 50 18 Q56 26 44 36 Q36 42 28 56 Z" fill="white"/></symbol>
  <symbol id="b-barber"   viewBox="0 0 64 64"><rect x="29" y="6" width="6" height="52" rx="3" fill="white"/><circle cx="32" cy="6" r="6" fill="white"/><circle cx="32" cy="58" r="6" fill="white"/><path d="M29 6 Q22 22 29 38" stroke="white" stroke-width="3.5" fill="none"/><path d="M35 6 Q42 22 35 38" stroke="white" stroke-width="3.5" fill="none"/></symbol>
  <symbol id="b-boat"     viewBox="0 0 64 64"><path d="M8 40 Q20 28 32 32 Q44 36 56 24" stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/><path d="M20 40 L20 16 L44 28 Z" fill="white"/><rect x="8" y="48" width="48" height="6" rx="2" fill="white"/></symbol>
  <symbol id="b-house"    viewBox="0 0 64 64"><path d="M32 8 L8 28 L14 28 L14 56 L50 56 L50 28 L56 28 Z" fill="white"/><rect x="24" y="38" width="16" height="18" rx="1" fill="black"/><rect x="14" y="28" width="12" height="12" rx="1" fill="black"/><rect x="38" y="28" width="12" height="12" rx="1" fill="black"/></symbol>
</svg>

<!-- Toggle button -->
<div id="toggle-btn"><span class="arr">&#9664;</span></div>

<div id="location-menu">
  <div class="menu-header" id="menu-title">Locations &amp; Businesses</div>
  <div id="locations-list"></div>
</div>

<!-- Info card (GTA Online style) -->
<div id="info-card">
  <div class="card-photo" id="card-photo">
    <div class="card-photo-grad"></div>
    <div class="card-name" id="card-name"></div>
  </div>
  <div class="card-stats" id="card-stats"></div>
  <div class="card-sep"></div>
  <div class="card-desc" id="card-desc"></div>
</div>

<script>
// active locale (set from NUI message)
let L = {
  labelDistrict: 'District',
  labelType:     'Type',
  labelOwner:    'Owner',
  labelServices: 'Services',
  labelHours:    'Hours',
  statusOpen:    'Open',
  status24h:     '24h / 7',
  statusClosed:  'Restricted access',
};

function valCls(s){ return s==='24h'?'blue':s==='open'?'green':'red'; }
function valTxt(s,h){ return s==='24h'?L.status24h : s==='open'?h : L.statusClosed; }

function showCard(loc) {
  const photoEl = document.getElementById('card-photo');
  // clear previous content (keep grad + name)
  const grad = photoEl.querySelector('.card-photo-grad');
  const nameEl = document.getElementById('card-name');
  // remove old img or fallback
  const old = photoEl.querySelector('img, .card-photo-fallback');
  if(old) old.remove();

  if(loc.photo){
    const img = document.createElement('img');
    img.src = loc.photo;
    img.alt = loc.name;
    img.onerror = function(){
      this.remove();
      const fb = document.createElement('div');
      fb.className = 'card-photo-fallback';
      fb.style.background = loc.bg || '#0d0d0d';
      fb.innerHTML = `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"
        style="width:110px;height:110px;opacity:0.07;filter:blur(2px)">
        <use href="#${loc.blip}"/></svg>`;
      photoEl.insertBefore(fb, grad);
    };
    photoEl.insertBefore(img, grad);
  } else {
    const fb = document.createElement('div');
    fb.className = 'card-photo-fallback';
    fb.style.background = loc.bg || '#0d0d0d';
    fb.innerHTML = `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"
      style="width:110px;height:110px;opacity:0.07;filter:blur(2px)">
      <use href="#${loc.blip}"/></svg>`;
    photoEl.insertBefore(fb, grad);
  }

  nameEl.textContent = loc.name;

  const rows = [
    {l:L.labelDistrict, v:loc.district},
    {l:L.labelType,     v:loc.type},
    {l:L.labelOwner,    v:loc.owner},
    {l:L.labelServices, v:loc.extras},
    {l:L.labelHours,    v:valTxt(loc.status,loc.hours), c:valCls(loc.status)},
  ];
  document.getElementById('card-stats').innerHTML = rows.map(r=>
    `<div class="card-row">
      <span class="card-lbl">${r.l}</span>
      <span class="card-val ${r.c||''}">${r.v}</span>
    </div>`).join('');
  document.getElementById('card-desc').textContent = loc.desc;
  document.getElementById('info-card').classList.add('visible');
}
function hideCard(){ document.getElementById('info-card').classList.remove('visible'); }

function buildList(locs, cfg){
  if(cfg && cfg.menuTitle)
    document.getElementById('menu-title').textContent = cfg.menuTitle;
  if(cfg && cfg.menuWidth)
    document.getElementById('location-menu').style.width = cfg.menuWidth + 'px';
  if(cfg && cfg.cardWidth)
    document.getElementById('info-card').style.width = cfg.cardWidth + 'px';

  const listEl = document.getElementById('locations-list');
  listEl.innerHTML = '';
  locs.forEach(loc => {
    const item = document.createElement('div');
    item.className = 'location-item';
    item.innerHTML = `
      <div class="blip-icon">
        ${loc.icon
          ? `<img src="${loc.icon}" alt="${loc.name}">`
          : `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><use href="#${loc.blip}"/></svg>`
        }
      </div>
      <div class="item-info">
        <div class="item-name">${loc.name}</div>
        <div class="item-district">${loc.district}</div>
      </div>
      <span class="item-arrow">&#9654;</span>`;
    item.addEventListener('click', () => {
      fetch(`https://${GetParentResourceName()}/menuClick`, {method:'POST', body:'{}'});
      const active = item.classList.contains('active');
      document.querySelectorAll('.location-item.active').forEach(i=>i.classList.remove('active'));
      if(active){ hideCard(); return; }
      item.classList.add('active');
      showCard(loc);
    });
    listEl.appendChild(item);
  });
}

// ── Toggle ──
let menuOpen = false;
const toggleBtn = document.getElementById('toggle-btn');
const menuEl    = document.getElementById('location-menu');
function setMenu(v){
  menuOpen = v;
  if(v){
    menuEl.classList.add('visible');
    toggleBtn.classList.add('open');
    toggleBtn.querySelector('.arr').innerHTML='&#9654;';
  } else {
    menuEl.classList.remove('visible');
    toggleBtn.classList.remove('open');
    toggleBtn.querySelector('.arr').innerHTML='&#9664;';
    hideCard();
    document.querySelectorAll('.location-item.active').forEach(i=>i.classList.remove('active'));
  }
}
toggleBtn.addEventListener('click', ()=>setMenu(!menuOpen));

// ── NUI messages ──
const audio = document.getElementById('music');
window.addEventListener('message', e => {
  if(e.data.type === 'playMusic'){
    audio.volume = e.data.volume || 1.0;
    audio.currentTime = 0;
    audio.play();

    const cfg  = e.data.menu      || {};
    const locs = e.data.locations || [];

    // apply locale
    if(e.data.locale) Object.assign(L, e.data.locale);

    // apply toggle button visibility
    if(cfg.showToggleButton !== false){
      toggleBtn.style.display = 'flex';
    }

    // use locale menu title if not overridden in cfg
    if(!cfg.menuTitle && L.menuTitle) cfg.menuTitle = L.menuTitle;

    // build list from server config
    if(locs.length > 0) buildList(locs, cfg);

    // auto-open
    if(cfg.menuOpenOnStart !== false) setMenu(true);
  }
  if(e.data.type === 'stopMusic'){
    audio.pause();
    audio.currentTime = 0;
    toggleBtn.style.display = 'none';
    setMenu(false);
  }
});

// ── ENTER → spawn ──
window.addEventListener('keydown', e => {
  if(e.code === 'Enter' || e.code === 'NumpadEnter')
    fetch(`https://${GetParentResourceName()}/enterPressed`, {method:'POST', body:'{}'});
});
</script>
</body>
</html>
