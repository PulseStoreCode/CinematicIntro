<svg xmlns="http://www.w3.org/2000/svg" style="display:none">

  <!-- strip_club / unicorn : silhouette femme -->
  <symbol id="blip-strip-club" viewBox="0 0 40 40">
    <circle cx="20" cy="20" r="20" fill="currentColor"/>
    <ellipse cx="20" cy="13" rx="4" ry="4" fill="white"/>
    <path d="M13 30 Q14 20 20 19 Q26 20 27 30 Z" fill="white"/>
    <path d="M13 30 L11 38 M27 30 L29 38" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  </symbol>

